name: punch-in-out

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Punch mode
        required: true
        type: choice
        options:
          - IN
          - OUT

concurrency:
  group: punch-in-out
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run bot
        env:
          MODE: ${{ inputs.mode }}

          LOGIN_URL: ${{ secrets.LOGIN_URL }}
          TARGET_URL: ${{ secrets.TARGET_URL }}
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}

          USERNAME_SELECTOR: ${{ secrets.USERNAME_SELECTOR }}
          PASSWORD_SELECTOR: ${{ secrets.PASSWORD_SELECTOR }}
          SUBMIT_SELECTOR: ${{ secrets.SUBMIT_SELECTOR }}

          BUTTON_IN_SELECTOR: ${{ secrets.BUTTON_IN_SELECTOR }}
          BUTTON_OUT_SELECTOR: ${{ secrets.BUTTON_OUT_SELECTOR }}
        run: node run.js

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ github.run_number }}
          path: |
            *.png
            debug.html
          if-no-files-found: ignore
          retention-days: 7
